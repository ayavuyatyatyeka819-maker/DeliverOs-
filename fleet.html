<!DOCTYPE html>
<html>
<head>
  <title>DeliverOS - Fleet</title>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0d1117;
      color: #e6edf3;
      font-family: Arial, sans-serif;
      padding: 20px;
      padding-bottom: 80px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .topbar h1 { font-size: 20px; }

    .btn-add {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 14px;
      text-align: center;
    }

    .stat-card p.num {
      font-size: 22px;
      font-weight: 700;
    }

    .stat-card p.label {
      font-size: 11px;
      color: #8b949e;
      margin-top: 4px;
    }

    .green { color: #3fb950; }
    .orange { color: #d29922; }
    .grey { color: #6e7681; }

    .driver-card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .driver-top {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 12px;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1e3a5f, #2563eb);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .driver-info { flex: 1; }

    .driver-name {
      font-size: 14px;
      font-weight: 600;
    }

    .driver-detail {
      font-size: 12px;
      color: #8b949e;
      margin-top: 2px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
    }

    .dot-active { background: #3fb950; }
    .dot-idle { background: #d29922; }
    .dot-offline { background: #6e7681; }

    .driver-stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .driver-stat {
      background: #0d1117;
      border-radius: 8px;
      padding: 8px;
      text-align: center;
    }

    .driver-stat p.val {
      font-size: 14px;
      font-weight: 700;
      color: #58a6ff;
    }

    .driver-stat p.lbl {
      font-size: 10px;
      color: #8b949e;
      margin-top: 2px;
    }

    .driver-actions {
      display: flex;
      gap: 8px;
    }

    .btn-status {
      flex: 1;
      padding: 7px;
      background: transparent;
      border: 1px solid #21262d;
      border-radius: 8px;
      color: #8b949e;
      font-size: 11px;
      cursor: pointer;
    }

    .btn-remove {
      padding: 7px 14px;
      background: transparent;
      border: 1px solid #f85149;
      border-radius: 8px;
      color: #f85149;
      font-size: 11px;
      cursor: pointer;
    }

    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal-bg.open { display: flex; }

    .modal {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 16px;
      padding: 24px;
      width: 90%;
      max-width: 360px;
    }

    .modal h2 { font-size: 16px; margin-bottom: 16px; }

    .modal input, .modal select {
      width: 100%;
      padding: 10px 14px;
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 10px;
      color: #e6edf3;
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
    }

    .modal-btns { display: flex; gap: 10px; }

    .btn-confirm {
      flex: 1;
      padding: 11px;
      background: #2563eb;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-cancel {
      flex: 1;
      padding: 11px;
      background: transparent;
      border: 1px solid #21262d;
      border-radius: 10px;
      color: #8b949e;
      font-size: 14px;
      cursor: pointer;
    }

    .empty {
      text-align: center;
      color: #8b949e;
      padding: 40px;
      font-size: 14px;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #161b22;
      border-top: 1px solid #21262d;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      z-index: 999;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      color: #8b949e;
      font-size: 10px;
      padding: 4px 12px;
      border-radius: 8px;
    }

    .nav-item.active { color: #58a6ff; }
    .nav-item span.icon { font-size: 20px; }
  </style>
</head>
<body>

  <div class="topbar">
    <h1>🚚 Fleet</h1>
    <button class="btn-add" onclick="openModal()">+ Add Driver</button>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <p class="num green" id="activeCount">0</p>
      <p class="label">Active</p>
    </div>
    <div class="stat-card">
      <p class="num orange" id="idleCount">0</p>
      <p class="label">Idle</p>
    </div>
    <div class="stat-card">
      <p class="num grey" id="offlineCount">0</p>
      <p class="label">Offline</p>
    </div>
  </div>

  <div id="driverList">
    <div class="empty">⏳ Loading drivers...</div>
  </div>

  <div class="modal-bg" id="modal">
    <div class="modal">
      <h2>➕ Add New Driver</h2>
      <input type="text" id="driverName" placeholder="Full name" />
      <input type="text" id="driverPhone" placeholder="Phone number" />
      <input type="text" id="driverVehicle" placeholder="Vehicle e.g Toyota Hilux" />
      <select id="driverStatus">
        <option value="active">Active</option>
        <option value="idle">Idle</option>
        <option value="offline">Offline</option>
      </select>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-confirm" onclick="addDriver()">Add Driver</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item">
      <span class="icon">⊞</span><span>Dashboard</span>
    </a>
    <a href="orders.html" class="nav-item">
      <span class="icon">📦</span><span>Orders</span>
    </a>
    <a href="fleet.html" class="nav-item active">
      <span class="icon">🚚</span><span>Fleet</span>
    </a>
    <a href="inventory.html" class="nav-item">
      <span class="icon">🏭</span><span>Inventory</span>
    </a>
    <a href="analytics.html" class="nav-item">
      <span class="icon">📊</span><span>Analytics</span>
    </a>
    <a href="settings.html" class="nav-item">
      <span class="icon">⚙️</span><span>Settings</span>
    </a>
  </nav>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      deleteDoc,
      updateDoc,
      doc,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA49Ty_swoots2VvdIZFfoMd1Rn-nFQNtI",
      authDomain: "deliveros-ddb37.firebaseapp.com",
      projectId: "deliveros-ddb37",
      storageBucket: "deliveros-ddb37.firebasestorage.app",
      messagingSenderId: "47557698801",
      appId: "1:47557698801:web:8963985a5327bba9e8b550"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    function getInitials(name) {
      return name.split(" ").map(n => n[0]).join("").toUpperCase().slice(0, 2);
    }

    onSnapshot(collection(db, "drivers"), (snapshot) => {
      let drivers = [];
      snapshot.forEach((d) => {
        drivers.push({ docId: d.id, ...d.data() });
      });

      document.getElementById("activeCount").innerText =
        drivers.filter(d => d.status === "active").length;
      document.getElementById("idleCount").innerText =
        drivers.filter(d => d.status === "idle").length;
      document.getElementById("offlineCount").innerText =
        drivers.filter(d => d.status === "offline").length;

      let list = document.getElementById("driverList");
      list.innerHTML = "";

      if (drivers.length === 0) {
        list.innerHTML = `<div class="empty">No drivers yet — add one!</div>`;
        return;
      }

      drivers.forEach((driver) => {
        list.innerHTML += `
          <div class="driver-card">
            <div class="driver-top">
              <div class="avatar">${getInitials(driver.name)}</div>
              <div class="driver-info">
                <p class="driver-name">${driver.name}</p>
                <p class="driver-detail">
                  <span class="status-dot dot-${driver.status}"></span>
                  ${driver.status}
                </p>
                <p class="driver-detail">📞 ${driver.phone || "—"}</p>
                <p class="driver-detail">🚗 ${driver.vehicle || "—"}</p>
              </div>
            </div>
            <div class="driver-stats">
              <div class="driver-stat">
                <p class="val">${driver.deliveries || 0}</p>
                <p class="lbl">Deliveries</p>
              </div>
              <div class="driver-stat">
                <p class="val">⭐ ${driver.rating || "5.0"}</p>
                <p class="lbl">Rating</p>
              </div>
              <div class="driver-stat">
                <p class="val">${driver.status}</p>
                <p class="lbl">Status</p>
              </div>
            </div>
            <div class="driver-actions">
              <select class="btn-status" 
                onchange="updateStatus('${driver.docId}', this.value)">
                <option value="active" ${driver.status === 'active' ? 'selected' : ''}>Active</option>
                <option value="idle" ${driver.status === 'idle' ? 'selected' : ''}>Idle</option>
                <option value="offline" ${driver.status === 'offline' ? 'selected' : ''}>Offline</option>
              </select>
              <button class="btn-remove" 
                onclick="removeDriver('${driver.docId}')">
                🗑 Remove
              </button>
            </div>
          </div>
        `;
      });
    });

    window.openModal = function() {
      document.getElementById("modal").className = "modal-bg open";
    }

    window.closeModal = function() {
      document.getElementById("modal").className = "modal-bg";
    }

    window.addDriver = async function() {
      let name = document.getElementById("driverName").value.trim();
      let phone = document.getElementById("driverPhone").value.trim();
      let vehicle = document.getElementById("driverVehicle").value.trim();
      let status = document.getElementById("driverStatus").value;

      if (!name) {
        alert("Please enter driver name!");
        return;
      }

      await addDoc(collection(db, "drivers"), {
        name: name,
        phone: phone || "—",
        vehicle: vehicle || "—",
        status: status,
        deliveries: 0,
        rating: "5.0"
      });

      document.getElementById("driverName").value = "";
      document.getElementById("driverPhone").value = "";
      document.getElementById("driverVehicle").value = "";
      closeModal();
    }

    window.removeDriver = async function(docId) {
      if (confirm("Remove this driver?")) {
        await deleteDoc(doc(db, "drivers", docId));
      }
    }

    window.updateStatus = async function(docId, newStatus) {
      await updateDoc(doc(db, "drivers", docId), {
        status: newStatus
      });
    }

  </script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(function() {
        console.log('DeliverOS SW registered');
      });
  }
</script> </body>
        </html>
