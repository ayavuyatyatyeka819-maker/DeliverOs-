<!DOCTYPE html>
<html>
<head>
  <title>DeliverOS - Orders</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0d1117;
      color: #e6edf3;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .topbar h1 { font-size: 20px; }

    .btn-new {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
    }

    .order-card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .order-top {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .order-id {
      font-size: 14px;
      font-weight: 600;
      color: #58a6ff;
    }

    .badge {
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
      height: fit-content;
    }

    .badge.transit { background: #1a3a5c; color: #4fc3f7; }
    .badge.delivered { background: #1a3a2a; color: #66bb6a; }
    .badge.pending { background: #3a2a0a; color: #d29922; }

    .order-info {
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 4px;
    }

    .order-value {
      font-size: 16px;
      font-weight: 700;
      margin-top: 10px;
    }

  </style>
</head>
<body>

  <div class="topbar">
    <h1>📦 Orders</h1>
    <button class="btn-new">+ New</button>
  </div>

  <div class="order-card">
    <div class="order-top">
      <span class="order-id">#ORD-1042</span>
      <span class="badge transit">In Transit</span>
    </div>
    <p class="order-info">Customer: TechFlow Inc.</p>
    <p class="order-info">Driver: Marcus Johnson</p>
    <p class="order-info">ETA: 12 min</p>
    <p class="order-value">$84.00</p>
  </div>

  <div class="order-card">
    <div class="order-top">
      <span class="order-id">#ORD-1041</span>
      <span class="badge delivered">Delivered</span>
    </div>
    <p class="order-info">Customer: NovaBuild Ltd.</p>
    <p class="order-info">Driver: Sarah Chen</p>
    <p class="order-info">ETA: Completed</p>
    <p class="order-value">$210.00</p>
  </div>

  <div class="order-card">
    <div class="order-top">
      <span class="order-id">#ORD-1039</span>
      <span class="badge pending">Pending</span>
    </div>
    <p class="order-info">Customer: CoreLogix</p>
    <p class="order-info">Driver: Unassigned</p>
    <p class="order-info">ETA: —</p>
    <p class="order-value">$130.00</p>
  </div>

</body>
  </html>
