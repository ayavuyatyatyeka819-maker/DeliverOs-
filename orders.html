<!DOCTYPE html>
<html>
<head>
  <title>DeliverOS - Orders</title>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0d1117;
      color: #e6edf3;
      font-family: Arial, sans-serif;
      padding: 20px;
      padding-bottom: 80px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .topbar h1 { font-size: 20px; }

    .btn-add {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      overflow-x: auto;
    }

    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #21262d;
      background: transparent;
      color: #8b949e;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }

    .filter-btn.active {
      background: #2563eb;
      color: white;
      border-color: #2563eb;
    }

    .order-card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .order-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .order-id {
      font-size: 14px;
      font-weight: 600;
      color: #58a6ff;
    }

    .badge {
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    .transit { background: #1a3a5c; color: #4fc3f7; }
    .delivered { background: #1a3a2a; color: #66bb6a; }
    .pending { background: #3a2a0a; color: #d29922; }

    .order-info {
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 4px;
    }

    .order-value {
      font-size: 16px;
      font-weight: 700;
      margin-top: 10px;
      color: #e6edf3;
    }

    .order-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .btn-delete {
      padding: 6px 14px;
      background: transparent;
      border: 1px solid #f85149;
      border-radius: 8px;
      color: #f85149;
      font-size: 12px;
      cursor: pointer;
    }

    .btn-complete {
      padding: 6px 14px;
      background: transparent;
      border: 1px solid #3fb950;
      border-radius: 8px;
      color: #3fb950;
      font-size: 12px;
      cursor: pointer;
    }

    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal-bg.open { display: flex; }

    .modal {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 16px;
      padding: 24px;
      width: 90%;
      max-width: 360px;
    }

    .modal h2 { font-size: 16px; margin-bottom: 16px; }

    .modal input, .modal select {
      width: 100%;
      padding: 10px 14px;
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 10px;
      color: #e6edf3;
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
    }

    .modal-btns { display: flex; gap: 10px; }

    .btn-confirm {
      flex: 1;
      padding: 11px;
      background: #2563eb;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-cancel {
      flex: 1;
      padding: 11px;
      background: transparent;
      border: 1px solid #21262d;
      border-radius: 10px;
      color: #8b949e;
      font-size: 14px;
      cursor: pointer;
    }

    .empty {
      text-align: center;
      color: #8b949e;
      padding: 40px;
      font-size: 14px;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #161b22;
      border-top: 1px solid #21262d;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      z-index: 999;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      color: #8b949e;
      font-size: 10px;
      padding: 4px 12px;
      border-radius: 8px;
    }

    .nav-item.active { color: #58a6ff; }
    .nav-item span.icon { font-size: 20px; }
  </style>
</head>
<body>

  <div class="topbar">
    <h1>📦 Orders</h1>
    <button class="btn-add" onclick="openModal()">+ New Order</button>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" onclick="filterOrders('all', this)">All</button>
    <button class="filter-btn" onclick="filterOrders('transit', this)">In Transit</button>
    <button class="filter-btn" onclick="filterOrders('pending', this)">Pending</button>
    <button class="filter-btn" onclick="filterOrders('delivered', this)">Delivered</button>
  </div>

  <div id="orderList">
    <div class="empty">⏳ Loading orders...</div>
  </div>

  <div class="modal-bg" id="modal">
    <div class="modal">
      <h2>➕ New Order</h2>
      <input type="text" id="customerName" placeholder="Customer name" />
      <input type="text" id="driverName" placeholder="Driver name" />
      <input type="text" id="orderValue" placeholder="Order value e.g 150" />
      <select id="orderStatus">
        <option value="pending">Pending</option>
        <option value="transit">In Transit</option>
        <option value="delivered">Delivered</option>
      </select>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-confirm" onclick="addOrder()">Add Order</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item">
      <span class="icon">⊞</span><span>Dashboard</span>
    </a>
    <a href="orders.html" class="nav-item active">
      <span class="icon">📦</span><span>Orders</span>
    </a>
    <a href="fleet.html" class="nav-item">
      <span class="icon">🚚</span><span>Fleet</span>
    </a>
    <a href="inventory.html" class="nav-item">
      <span class="icon">🏭</span><span>Inventory</span>
    </a>
    <a href="analytics.html" class="nav-item">
      <span class="icon">📊</span><span>Analytics</span>
    </a>
    <a href="settings.html" class="nav-item">
      <span class="icon">⚙️</span><span>Settings</span>
    </a>
  </nav>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      deleteDoc,
      updateDoc,
      doc,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA49Ty_swoots2VvdIZFfoMd1Rn-nFQNtI",
      authDomain: "deliveros-ddb37.firebaseapp.com",
      projectId: "deliveros-ddb37",
      storageBucket: "deliveros-ddb37.firebasestorage.app",
      messagingSenderId: "47557698801",
      appId: "1:47557698801:web:8963985a5327bba9e8b550"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let allOrders = [];
    let currentFilter = "all";

    let statusLabel = {
      transit: "In Transit",
      delivered: "Delivered",
      pending: "Pending"
    };

    // Listen to orders in real time
    onSnapshot(collection(db, "orders"), (snapshot) => {
      allOrders = [];
      snapshot.forEach((doc) => {
        allOrders.push({ docId: doc.id, ...doc.data() });
      });
      renderOrders();
    });

    function renderOrders() {
      let list = document.getElementById("orderList");
      let filtered = currentFilter === "all"
        ? allOrders
        : allOrders.filter(o => o.status === currentFilter);

      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty">No orders found!</div>`;
        return;
      }

      list.innerHTML = "";
      filtered.forEach((order) => {
        list.innerHTML += `
          <div class="order-card">
            <div class="order-top">
              <span class="order-id">${order.id}</span>
              <span class="badge ${order.status}">
                ${statusLabel[order.status]}
              </span>
            </div>
            <p class="order-info">👤 Customer: ${order.customer}</p>
            <p class="order-info">🚚 Driver: ${order.driver}</p>
            <p class="order-value">$${order.value || "0"}</p>
            <div class="order-actions">
              <button class="btn-complete" 
                onclick="markDelivered('${order.docId}')">
                ✅ Mark Delivered
              </button>
              <button class="btn-delete" 
                onclick="deleteOrder('${order.docId}')">
                🗑 Delete
              </button>
            </div>
          </div>
        `;
      });
    }

    window.filterOrders = function(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll(".filter-btn").forEach(b => {
        b.classList.remove("active");
      });
      btn.classList.add("active");
      renderOrders();
    }

    window.openModal = function() {
      document.getElementById("modal").className = "modal-bg open";
    }

    window.closeModal = function() {
      document.getElementById("modal").className = "modal-bg";
    }

    window.addOrder = async function() {
      let customer = document.getElementById("customerName").value.trim();
      let driver = document.getElementById("driverName").value.trim();
      let value = document.getElementById("orderValue").value.trim();
      let status = document.getElementById("orderStatus").value;

      if (!customer) {
        alert("Please enter a customer name!");
        return;
      }

      await addDoc(collection(db, "orders"), {
        id: "#ORD-" + Date.now(),
        customer: customer,
        driver: driver || "Unassigned",
        value: value || "0",
        status: status,
      });

      document.getElementById("customerName").value = "";
      document.getElementById("driverName").value = "";
      document.getElementById("orderValue").value = "";
      closeModal();
    }

    window.deleteOrder = async function(docId) {
      if (confirm("Delete this order?")) {
        await deleteDoc(doc(db, "orders", docId));
      }
    }

    window.markDelivered = async function(docId) {
      await updateDoc(doc(db, "orders", docId), {
        status: "delivered"
      });
    }

  </script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(function() {
        console.log('DeliverOS SW registered');
      });
  }
</script> </body>
  </html>
