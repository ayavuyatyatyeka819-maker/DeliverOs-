<!DOCTYPE html>
<html>
<head>
  <title>DeliverOS - Firebase</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0d1117;
      color: #e6edf3;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .topbar h1 { font-size: 20px; }

    .badge {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    .live {
      background: #1a3a2a;
      color: #3fb950;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 24px;
    }

    .card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 12px;
      padding: 18px;
    }

    .card p.label {
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 6px;
    }

    .card p.value {
      font-size: 24px;
      font-weight: 700;
    }

    .blue { color: #58a6ff; }
    .green { color: #3fb950; }
    .orange { color: #d29922; }
    .purple { color: #a371f7; }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .section-title { font-size: 14px; font-weight: 600; }

    .btn-add {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .order-card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .order-id {
      font-size: 13px;
      font-weight: 600;
      color: #58a6ff;
    }

    .order-customer {
      font-size: 11px;
      color: #8b949e;
      margin-top: 2px;
    }

    .status-badge {
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    .transit { background: #1a3a5c; color: #4fc3f7; }
    .delivered { background: #1a3a2a; color: #66bb6a; }
    .pending { background: #3a2a0a; color: #d29922; }

    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal-bg.open { display: flex; }

    .modal {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 16px;
      padding: 24px;
      width: 90%;
      max-width: 360px;
    }

    .modal h2 { font-size: 16px; margin-bottom: 16px; }

    .modal input, .modal select {
      width: 100%;
      padding: 10px 14px;
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 10px;
      color: #e6edf3;
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
    }

    .modal-btns { display: flex; gap: 10px; }

    .btn-confirm {
      flex: 1;
      padding: 11px;
      background: #2563eb;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-cancel {
      flex: 1;
      padding: 11px;
      background: transparent;
      border: 1px solid #21262d;
      border-radius: 10px;
      color: #8b949e;
      font-size: 14px;
      cursor: pointer;
    }

    .loading {
      text-align: center;
      color: #8b949e;
      padding: 40px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <h1>🚀 DeliverOS</h1>
    <span class="badge live">🔴 Live</span>
  </div>

  <div class="stats">
    <div class="card">
      <p class="label">Total Orders</p>
      <p class="value blue" id="totalOrders">—</p>
    </div>
    <div class="card">
      <p class="label">Delivered</p>
      <p class="value green" id="totalDelivered">—</p>
    </div>
    <div class="card">
      <p class="label">In Transit</p>
      <p class="value orange" id="totalTransit">—</p>
    </div>
    <div class="card">
      <p class="label">Pending</p>
      <p class="value purple" id="totalPending">—</p>
    </div>
  </div>

  <div class="section-header">
    <p class="section-title">Live Orders from Firebase</p>
    <button class="btn-add" onclick="openModal()">+ New Order</button>
  </div>

  <div id="orderList">
    <div class="loading">⏳ Loading orders from Firebase...</div>
  </div>

  <div class="modal-bg" id="modal">
    <div class="modal">
      <h2>➕ Add New Order</h2>
      <input type="text" id="customerName" placeholder="Customer name" />
      <input type="text" id="driverName" placeholder="Driver name" />
      <select id="orderStatus">
        <option value="pending">Pending</option>
        <option value="transit">In Transit</option>
        <option value="delivered">Delivered</option>
      </select>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-confirm" onclick="addOrder()">Add Order</button>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { 
      getFirestore, 
      collection, 
      addDoc, 
      onSnapshot,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // Your Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyA49Ty_swoots2VvdIZFfoMd1Rn-nFQNtI",
      authDomain: "deliveros-ddb37.firebaseapp.com",
      projectId: "deliveros-ddb37",
      storageBucket: "deliveros-ddb37.firebasestorage.app",
      messagingSenderId: "47557698801",
      appId: "1:47557698801:web:8963985a5327bba9e8b550"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let statusLabel = {
      transit: "In Transit",
      delivered: "Delivered",
      pending: "Pending"
    };

    // Listen to orders in REAL TIME
    const ordersRef = collection(db, "orders");

    onSnapshot(ordersRef, (snapshot) => {
      let orders = [];
      snapshot.forEach((doc) => {
        orders.push({ docId: doc.id, ...doc.data() });
      });

      // Update stats
      document.getElementById("totalOrders").innerText = orders.length;
      document.getElementById("totalDelivered").innerText = 
        orders.filter(o => o.status === "delivered").length;
      document.getElementById("totalTransit").innerText = 
        orders.filter(o => o.status === "transit").length;
      document.getElementById("totalPending").innerText = 
        orders.filter(o => o.status === "pending").length;

      // Show orders
      let list = document.getElementById("orderList");
      list.innerHTML = "";

      if (orders.length === 0) {
        list.innerHTML = `
          <div class="loading">No orders yet — add one!</div>
        `;
        return;
      }

      orders.forEach((order) => {
        list.innerHTML += `
          <div class="order-card">
            <div>
              <p class="order-id">${order.id || "No ID"}</p>
              <p class="order-customer">${order.customer}</p>
              <p class="order-customer">👤 ${order.driver}</p>
            </div>
            <span class="status-badge ${order.status}">
              ${statusLabel[order.status] || order.status}
            </span>
          </div>
        `;
      });
    });

    // Add new order to Firebase
    window.addOrder = async function() {
      let customer = document.getElementById("customerName").value.trim();
      let driver = document.getElementById("driverName").value.trim();
      let status = document.getElementById("orderStatus").value;

      if (customer === "") {
        alert("Please enter a customer name!");
        return;
      }

      try {
        await addDoc(collection(db, "orders"), {
          id: "#ORD-" + Date.now(),
          customer: customer,
          driver: driver || "Unassigned",
          status: status,
        });

        document.getElementById("customerName").value = "";
        document.getElementById("driverName").value = "";
        closeModal();

      } catch (error) {
        alert("Error adding order: " + error.message);
      }
    }

    window.openModal = function() {
      document.getElementById("modal").className = "modal-bg open";
    }

    window.closeModal = function() {
      document.getElementById("modal").className = "modal-bg";
    }

  </script>

</body>
    </html>
