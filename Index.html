<!DOCTYPE html>
<html>
<head>
  <title>DeliverOS - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0d1117;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .login-box {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 16px;
      padding: 40px 32px;
      width: 90%;
      max-width: 380px;
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-icon {
      background: linear-gradient(135deg, #2563eb, #0ea5e9);
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 12px;
    }

    .logo h1 {
      font-size: 22px;
      font-weight: 700;
      color: #e6edf3;
    }

    .logo p {
      font-size: 13px;
      color: #8b949e;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #8b949e;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 10px;
      color: #e6edf3;
      font-size: 14px;
      outline: none;
    }

    input:focus {
      border-color: #2563eb;
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #2563eb, #0ea5e9);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }

    .divider {
      text-align: center;
      color: #8b949e;
      font-size: 12px;
      margin: 18px 0;
    }

    .btn-signup {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid #21262d;
      border-radius: 10px;
      color: #8b949e;
      font-size: 14px;
      cursor: pointer;
    }

    .forgot {
      text-align: right;
      margin-top: 6px;
    }

    .forgot a {
      color: #58a6ff;
      font-size: 12px;
      text-decoration: none;
    }

    .footer-text {
      text-align: center;
      font-size: 11px;
      color: #8b949e;
      margin-top: 24px;
    }
  </style>
</head>
<body>

  <div class="login-box">

    <div class="logo">
      <div class="logo-icon">🚀</div>
      <h1>DeliverOS</h1>
      <p>Delivery Management Platform</p>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" placeholder="you@company.com" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" placeholder="Enter your password" />
      <div class="forgot"><a href="#">Forgot password?</a></div>
    </div>

    <button class="btn-login" 
      onclick="alert('Welcome to DeliverOS! 🚀')">
      Sign In
    </button>

    <div class="divider">— or —</div>

    <button class="btn-signup">
      Create New Account
    </button>

    <p class="footer-text">
      © 2026 DeliverOS · All rights reserved
    </p>

  </div>

</body>
  </html>
