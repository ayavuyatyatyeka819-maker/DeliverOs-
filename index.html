<!DOCTYPE html>
<html>
<head>
  <title>DeliverOS - Login</title>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0d1117;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .login-box {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 16px;
      padding: 40px 32px;
      width: 90%;
      max-width: 380px;
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-icon {
      background: linear-gradient(135deg, #2563eb, #0ea5e9);
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 12px;
    }

    .logo h1 {
      font-size: 22px;
      font-weight: 700;
      color: #e6edf3;
    }

    .logo p {
      font-size: 13px;
      color: #8b949e;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #8b949e;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 10px;
      color: #e6edf3;
      font-size: 14px;
      outline: none;
    }

    input:focus {
      border-color: #2563eb;
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #2563eb, #0ea5e9);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }

    .message {
      text-align: center;
      margin-top: 14px;
      font-size: 13px;
      padding: 10px;
      border-radius: 8px;
      display: none;
    }

    .message.success {
      background: #1a3a2a;
      color: #3fb950;
      display: block;
    }

    .message.error {
      background: #3a1a1a;
      color: #f85149;
      display: block;
    }

    .divider {
      text-align: center;
      color: #8b949e;
      font-size: 12px;
      margin: 18px 0;
    }

    .btn-signup {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid #21262d;
      border-radius: 10px;
      color: #8b949e;
      font-size: 14px;
      cursor: pointer;
    }

    .forgot {
      text-align: right;
      margin-top: 6px;
    }

    .forgot a {
      color: #58a6ff;
      font-size: 12px;
      text-decoration: none;
    }

    .footer-text {
      text-align: center;
      font-size: 11px;
      color: #8b949e;
      margin-top: 24px;
    }

    .loading {
      opacity: 0.7;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="login-box">

    <div class="logo">
      <div class="logo-icon">🚀</div>
      <h1>DeliverOS</h1>
      <p>Delivery Management Platform</p>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input
        type="email"
        id="email"
        placeholder="you@company.com"
      />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input
        type="password"
        id="password"
        placeholder="Enter your password"
      />
      <div class="forgot"><a href="#">Forgot password?</a></div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="login()">
      Sign In
    </button>

    <p class="message" id="message"></p>

    <div class="divider">— or —</div>

    <button class="btn-signup">
      Create New Account
    </button>

    <p class="footer-text">
      © 2026 DeliverOS · All rights reserved
    </p>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA49Ty_swoots2VvdIZFfoMd1Rn-nFQNtI",
      authDomain: "deliveros-ddb37.firebaseapp.com",
      projectId: "deliveros-ddb37",
      storageBucket: "deliveros-ddb37.firebasestorage.app",
      messagingSenderId: "47557698801",
      appId: "1:47557698801:web:8963985a5327bba9e8b550"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.login = async function() {
      let email = document.getElementById("email").value.trim();
      let password = document.getElementById("password").value.trim();
      let message = document.getElementById("message");
      let btn = document.getElementById("loginBtn");

      if (email === "" || password === "") {
        message.innerText = "⚠️ Please fill in all fields!";
        message.className = "message error";
        return;
      }

      // Show loading state
      btn.innerText = "Signing in...";
      btn.classList.add("loading");

      try {
        await signInWithEmailAndPassword(auth, email, password);
        message.innerText = "✅ Welcome to DeliverOS! Redirecting...";
        message.className = "message success";

        setTimeout(function() {
          window.location.href = "dashboard.html";
        }, 1500);

      } catch (error) {
        btn.innerText = "Sign In";
        btn.classList.remove("loading");

        if (error.code === "auth/invalid-credential") {
          message.innerText = "❌ Wrong email or password!";
        } else if (error.code === "auth/too-many-requests") {
          message.innerText = "⚠️ Too many attempts. Try again later!";
        } else {
          message.innerText = "❌ Error: " + error.message;
        }
        message.className = "message error";
      }
    }
  </script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(function() {
        console.log('DeliverOS SW registered');
      });
  }
</script> </body>
  </html>
